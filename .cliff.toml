  description = "Code style changes"

[[types]]
  title = "♻️ Refactoring"
  regex = "^(refactor|refactoring)"
  description = "Code refactoring"

[[types]]
  title = "⚡ Performance"
  regex = "^(perf|performance)"
  description = "Performance improvements"

[[types]]
  title = "🧪 Tests"
  regex = "^(test|tests)"
  description = "Test additions or updates"

[[types]]
  title = "🔧 Build System"
  regex = "^(build|ci)"
  description = "Build system and CI changes"

[[types]]
  title = "🔒 Security"
  regex = "^(security|sec)"
  description = "Security fixes and improvements"

[[types]]
  title = "🧹 Chores"
  regex = "^(chore|maintenance)"
  description = "Maintenance tasks"

[[types]]
  title = "💥 Breaking Changes"
  regex = "^(break|breaking)"
  description = "Breaking changes"

[[types]]
  title = "🎉 Initial Commit"
  regex = "^initial"
  description = "Initial commit"

