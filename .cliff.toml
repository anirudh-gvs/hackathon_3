# Git-Cliff Configuration for Offline DocScan
# Automated changelog generation from git history
# https://git-cliff.org/

# =============================================================================
# General Configuration
# =============================================================================

# Changelog output file
output_file = "CHANGELOG.md"

# Template file (optional, uses built-in if not specified)
# template = "cliff-template.md"

# Include unreleased changes
include_unreleased = true

# Sort commits by date (newest first)
sort = "date"

# Filter commits by these tags
filter = "unreleased"

# Git repository path
git_repo = "."

# Changelog title
changelog_title = "Changelog"

# Backtrace limit for errors
backtrace_limit = 5

# Skip commits matching these patterns
skip_commits = [
    "chore: release",
    "chore: bump version",
    "Merge branch",
    "Merge pull request",
    "Revert",
]

# =============================================================================
# Commit Parsing Configuration
# =============================================================================

# Parse conventional commits
parse_commit = true

# Parse commit trailers (e.g., "Reviewed-by:", "Signed-off-by:")
parse_trailers = true

# Group commits by these categories
group = "all"

# =============================================================================
# Commit Groups
# =============================================================================

# Define commit groups with their emojis and titles
[[groups]]
  title = "🚀 Features"
  regex = "^(feat|feature)"
  description = "New features"

[[groups]]
  title = "🐛 Bug Fixes"
  regex = "^(fix|bugfix)"
  description = "Bug fixes"

[[groups]]
  title = "📚 Documentation"
  regex = "^(docs|documentation)"
  description = "Documentation changes"

[[groups]]
  title = "🎨 Style"
  regex = "^(style)"
  description = "Code style changes (formatting, etc.)"

[[groups]]
  title = "♻️ Refactoring"
  regex = "^(refactor|refactoring)"
  description = "Code refactoring"

[[groups]]
  title = "⚡ Performance"
  regex = "^(perf|performance)"
  description = "Performance improvements"

[[groups]]
  title = "🧪 Tests"
  regex = "^(test|tests)"
  description = "Test additions or updates"

[[groups]]
  title = "🔧 Build System"
  regex = "^(build|ci)"
  description = "Build system and CI changes"

[[groups]]
  title = "🔒 Security"
  regex = "^(security|sec)"
  description = "Security fixes and improvements"

[[groups]]
  title = "🧹 Chores"
  regex = "^(chore|maintenance)"
  description = "Maintenance tasks"

[[groups]]
  title = "💥 Breaking Changes"
  regex = "^(break|breaking)"
  description = "Breaking changes"

[[groups]]
  title = "🎉 Initial Commit"
  regex = "^initial"
  description = "Initial commit"

