[[scopes]]
  prefix = "chore"
  title = "Chores"
  description = "Maintenance tasks"

# =============================================================================
# Commit Body Parser
# =============================================================================

# Extract breaking changes from commit body
[commit_parsers]
  breaking = "💥 Breaking Changes"
  feature = "🚀 Features"
  bugfix = "🐛 Bug Fixes"
  documentation = "📚 Documentation"
  refactor = "♻️ Refactoring"
  performance = "⚡ Performance"
  test = "🧪 Tests"
  build = "🔧 Build System"
  security = "🔒 Security"
  chore = "🧹 Chores"

# =============================================================================
# Footer Parser
# =============================================================================

# Extract information from commit footers
[footer_parsers]
  # Extract breaking changes
  breaking = "BREAKING CHANGE:"
  
  # Extract issue references
  issue = "Closes|Fixes|Resolves"
  
  # Extract reviewed by
  reviewed = "Reviewed-by:"
  
  # Extract signed off by
  signed = "Signed-off-by:"

# =============================================================================
# Template Configuration
# =============================================================================

# Use built-in template
[templates]
  # Use built-in template
  template = "default"

# =============================================================================
# Post-processing
# =============================================================================

# Post-process the generated changelog
[post_process]
  replace = [
    { pattern = '#(\\d+)', value = '[#$1](https://code.swecha.org/Gvs_Anirudh/cpu_first_hackathon/-/issues/$1)' },
  ]

# =============================================================================
# Git Commands
# =============================================================================

# Git log command to generate changelog
[git]
  # Conventional commits parsing
  conventional_commits = true
  
  # Filter by conventional commits only
  filter_conventional = true
  
  # Split commits by type
  split_commits = true
  
  # Commit limit (0 = unlimited)
  limit = 1000
  
  # Skip merge commits
  skip_merge = true
  
  # Skip revert commits
  skip_revert = true
  
  # Commit date format
  date_format = "%Y-%m-%d"
  
  # Commit time format
  time_format = "%H:%M:%S"

# =============================================================================
# Version Configuration
# =============================================================================

# Version bump strategy
[version]
  # Version bump rules
  bump = "auto"
  
  # Version file (optional)
  # file = "docscan/__init__.py"
  
  # Version pattern in file
  # pattern = "__version__ = \"{version}\""
  
  # Version prefix
  prefix = "v"
  
  # Version separator
  separator = "."

# =============================================================================
# Release Configuration
# =============================================================================

# Generate release notes
[release]
  # Generate release notes
  generate = true
  
  # Release notes template
  # template = "release-notes-template.md"
  
  # Release notes file
  # file = "RELEASES.md"
  
  # Draft release
  draft = false
  
  # Publish release
  publish = false

# =============================================================================
# Tag Configuration
# =============================================================================

# Tag naming convention
[tag]
  # Tag prefix
  prefix = "v"
  
  # Tag separator
  separator = "."
  
  # Tag format
  format = "v{version}"

# =============================================================================
# Remote Configuration
# =============================================================================

# Remote repository
[remote]
  # Remote name
  name = "origin"
  
  # Remote URL
  # url = "https://code.swecha.org/Gvs_Anirudh/cpu_first_hackathon.git"

# =============================================================================
# Advanced Options
# =============================================================================

# Enable debug mode
debug = false

# Enable verbose output
verbose = false

# Cache directory
cache_dir = ".cliff-cache"

# Parallel processing
parallel = true

# Number of parallel workers
workers = 4