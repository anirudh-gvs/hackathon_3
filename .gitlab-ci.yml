stages:
  - lint
  - format
  - type_check
  - security
  - test
  - coverage
  - commit-quality

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR\\.pip_cache"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

cache:
  key: "$CI_JOB_NAME"
  paths:
    - .pip_cache/

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_TAG'

before_script:
  - |
    $PY = $null
    foreach ($cmd in @("python", "py", "python3")) {
      try {
        & $cmd --version 2>$null | Out-Null
        $PY = $cmd
        break
      } catch { }
    }
    if (-not $PY) { Write-Error "Python not found"; exit 1 }
    Write-Host "Using Python: $PY"
    if (-not (Test-Path ".venv")) { & $PY -m venv .venv }
    .\.venv\Scripts\Activate.ps1
    python -m pip install --upgrade pip -q

lint-pylint:
  stage: lint
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet pylint
    - pylint docscan/ --rcfile=.pylintrc --fail-under=7.0 --output-format=text; if (-not $?) { Write-Host "pylint warnings (allowed)" }

lint-flake8:
  stage: lint
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet flake8
    - flake8 docscan/ --config=.flake8 --statistics --show-source; if (-not $?) { Write-Host "flake8 warnings (allowed)" }

pyupgrade-check:
  stage: lint
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet pyupgrade
    - pyupgrade --py311-plus docscan/*.py; if (-not $?) { Write-Host "pyupgrade warnings (allowed)" }

lint-vulture:
  stage: lint
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet vulture
    - vulture docscan/ tests/ --config=.vulture.toml --min-confidence 60; if (-not $?) { Write-Host "vulture warnings (allowed)" }

json-syntax-validation:
  stage: lint
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - python docscan/ci_checks.py toml; if (-not $?) { Write-Host "toml validation warnings (allowed)" }

yaml-syntax-validation:
  stage: lint
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet yamllint
    - yamllint -d '{"extends":"default","rules":{"line-length":{"max":200},"truthy":{"check-keys":false}}}' .gitlab-ci.yml; if (-not $?) { Write-Host "yamllint warnings (allowed)" }

license-headers:
  stage: lint
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - python docscan/ci_checks.py license-headers; if (-not $?) { Write-Host "license-header warnings (allowed)" }

python-lint:
  stage: lint
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet ruff
    - ruff check --line-length 100 docscan/ tests/; if (-not $?) { Write-Host "ruff lint warnings (allowed)" }

python-format:
  stage: format
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet ruff
    - ruff format --check docscan/ tests/; if (-not $?) { Write-Host "ruff format warnings (allowed)" }

python-typecheck:
  stage: type_check
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet mypy pydantic typer rich
    - mypy docscan/ --ignore-missing-imports --strict-optional --no-error-summary; if (-not $?) { Write-Host "mypy warnings (allowed)" }

security-semgrep:
  stage: security
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet semgrep
    - semgrep --config=auto --error --sarif --output=semgrep-results.sarif docscan/; if (-not $?) { Write-Host "semgrep warnings (allowed)" }
  artifacts:
    paths:
      - semgrep-results.sarif
    expire_in: 1 week
    when: always

python-security:
  stage: security
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet bandit
    - bandit -r docscan/ -ll -f txt -x docscan/ci_checks.py; if (-not $?) { Write-Host "bandit warnings (allowed)" }

dependency-audit:
  stage: security
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet pip-audit
    - pip-audit --skip-editable --progress-spinner off; if (-not $?) { Write-Host "pip-audit warnings (allowed)" }

secret-scanning:
  stage: security
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - python docscan/ci_checks.py secrets; if (-not $?) { Write-Host "secret-scanning warnings (allowed)" }

secret-scanning-gitleaks:
  stage: security
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet gitleaks
    - gitleaks detect --config=.gitleaks.toml --source=. --report-path=gitleaks-report.json --report-format=json --redact; if (-not $?) { Write-Host "gitleaks warnings (allowed)" }
  artifacts:
    paths:
      - gitleaks-report.json
    expire_in: 1 week
    when: always

python-unittest:
  stage: test
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet pytest pydantic typer rich pdfplumber pytesseract Pillow
    - pytest tests/ -v

python-coverage:
  stage: coverage
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - pip install --quiet pytest pytest-cov pydantic typer rich pdfplumber pytesseract Pillow
    - pytest tests/ -v --tb=short --cov=docscan --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=50
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week
    when: always

commit-quality:
  stage: commit-quality
  tags: [hackthon_3]
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - .\.venv\Scripts\Activate.ps1
    - python docscan/ci_checks.py commit; if (-not $?) { Write-Host "commit-quality warnings (allowed)" }
