---
stages:
  - lint
  - type-check
  - security
  - test
  - commit-quality

json-syntax-validation:
  stage: lint
  tags:
    - hackthon_3
  script:
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pip install -e . --quiet'
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" docscan/ci_checks.py toml'

python-format:
  stage: lint
  tags:
    - hackthon_3
  script:
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pip install black --quiet'
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m black --check --line-length 100 docscan/ tests/'

python-lint:
  stage: lint
  tags:
    - hackthon_3
  script:
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pip install ruff --quiet'
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m ruff check --line-length 100 docscan/ tests/'

yaml-syntax-validation:
  stage: lint
  tags:
    - hackthon_3
  script:
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pip install yamllint --quiet'
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m yamllint -d "{extends: default, rules: {line-length: {max: 200}, truthy: {check-keys: false}}}" .gitlab-ci.yml'

python-typecheck:
  stage: type-check
  tags:
    - hackthon_3
  script:
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pip install mypy pydantic typer rich --quiet'
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pip install -e . --quiet'
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m mypy docscan/ --ignore-missing-imports --strict-optional --no-error-summary'

python-security:
  stage: security
  tags:
    - hackthon_3
  script:
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pip install bandit --quiet'
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m bandit -r docscan/ -ll -f txt -x docscan/ci_checks.py'

dependency-audit:
  stage: security
  tags:
    - hackthon_3
  allow_failure: true
  script:
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pip install pip-audit --quiet'
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pip_audit --skip-editable --progress-spinner off'

secret-scanning:
  stage: security
  tags:
    - hackthon_3
  script:
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pip install -e . --quiet'
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" docscan/ci_checks.py secrets'

python-unittest:
  stage: test
  tags:
    - hackthon_3
  script:
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pip install pytest pytest-cov pydantic typer rich pdfplumber pytesseract Pillow --quiet'
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pip install -e . --quiet'
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pytest tests/ -v --tb=short --cov=docscan --cov-report=term-missing --cov-fail-under=50'
  coverage: '/TOTAL.*\s+(\d+%)$/'

commit-quality:
  stage: commit-quality
  tags:
    - hackthon_3
  script:
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" -m pip install -e . --quiet'
    - '& "C:\Users\aniru\AppData\Local\Programs\Python\Python311\python.exe" docscan/ci_checks.py commit'
