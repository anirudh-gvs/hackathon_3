stages:
  - lint
  - format
  - type-check
  - security
  - test
  - commit-quality

default:
  image: python:3.11-slim-bookworm
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git cmake build-essential && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
  after_script:
    - rm -rf .pip_cache

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip_cache"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

cache:
  key: "$CI_JOB_NAME"
  paths:
    - .pip_cache/

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_TAG'

lint-pylint:
  stage: lint
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - pip install --quiet pylint
    - pylint docscan/ --rcfile=.pylintrc --fail-under=7.0 --output-format=text || true

lint-flake8:
  stage: lint
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - pip install --quiet flake8
    - flake8 docscan/ --config=.flake8 --statistics --show-source || true

pyupgrade-check:
  stage: lint
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - pip install --quiet pyupgrade
    - pyupgrade --py311-plus docscan/*.py || true

lint-vulture:
  stage: lint
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - pip install --quiet vulture
    - vulture docscan/ tests/ --config=.vulture.toml --min-confidence 60 || true

json-syntax-validation:
  stage: lint
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - python docscan/ci_checks.py toml || true

yaml-syntax-validation:
  stage: lint
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - pip install --quiet yamllint
    - yamllint -d "{extends: default, rules: {line-length: {max: 200}, truthy: {check-keys: false}}}" .gitlab-ci.yml || true

license-headers:
  stage: lint
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - python docscan/ci_checks.py license-headers || true

python-lint:
  stage: lint
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - pip install --quiet ruff
    - ruff check --line-length 100 docscan/ tests/ || true

python-format:
  stage: format
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - pip install --quiet ruff
    - ruff format --check docscan/ tests/ || true

python-typecheck:
  stage: type-check
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - pip install --quiet mypy pydantic typer rich
    - mypy docscan/ --ignore-missing-imports --strict-optional --no-error-summary || true

security-semgrep:
  stage: security
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - pip install --quiet semgrep
    - semgrep --config=auto --error --sarif --output=semgrep-results.sarif docscan/ || true
  artifacts:
    paths:
      - semgrep-results.sarif
    expire_in: 1 week
    when: always

python-security:
  stage: security
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - pip install --quiet bandit
    - bandit -r docscan/ -ll -f txt -x docscan/ci_checks.py || true

dependency-audit:
  stage: security
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - pip install --quiet pip-audit
    - pip-audit --skip-editable --progress-spinner off || true

secret-scanning:
  stage: security
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - python docscan/ci_checks.py secrets || true

secret-scanning-gitleaks:
  stage: security
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet gitleaks
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - gitleaks detect --config=.gitleaks.toml --source=. --report-path=gitleaks-report.json --report-format=json --redact || true
  artifacts:
    paths:
      - gitleaks-report.json
    expire_in: 1 week
    when: always

python-unittest:
  stage: test
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - pip install --quiet pytest pytest-cov pydantic typer rich pdfplumber pytesseract Pillow
    - pytest tests/ -v --tb=short --cov=docscan --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=0 || true
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week
    when: always

commit-quality:
  stage: commit-quality
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tesseract-ocr tesseract-ocr-eng poppler-utils gcc g++ make cmake libgomp1 && rm -rf /var/lib/apt/lists/*
    - pip install --quiet --upgrade pip
    - pip install --quiet -e .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - python docscan/ci_checks.py commit || true