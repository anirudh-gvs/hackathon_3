stages:
  - lint
  - test
  - coverage

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip_cache"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  GIT_CLEAN_FLAGS: "-ffdx -e .venv/"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .pip_cache/
    - .venv/

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_TAG'

before_script:
  - |
    if command -v python3 &>/dev/null; then
      PY="python3"
    elif command -v python &>/dev/null; then
      PY="python"
    else
      echo "Error: Python not found!"
      exit 1
    fi
    echo "Using Python: $PY"
    if [ ! -d ".venv" ]; then
      $PY -m venv .venv
      .venv/bin/python -m pip install --upgrade pip -q
      .venv/bin/pip install --quiet pytest pytest-cov pydantic typer rich pdfplumber pytesseract Pillow pylint flake8 pyupgrade vulture yamllint ruff semgrep bandit pip-audit -e .
    fi

lint-job:
  stage: lint
  tags: [hackthon_3]
  allow_failure: true
  script:
    - .venv/bin/pylint docscan/ --rcfile=.pylintrc --fail-under=7.0 --output-format=text
    - .venv/bin/flake8 docscan/ --config=.flake8 --statistics --show-source
    - .venv/bin/pyupgrade --py311-plus docscan/*.py
    - .venv/bin/vulture docscan/ tests/ --config=.vulture.toml --min-confidence 60
    - .venv/bin/yamllint -d '{"extends":"default","rules":{"line-length":{"max":200},"truthy":{"check-keys":false}}}' .gitlab-ci.yml
    - .venv/bin/python docscan/ci_checks.py toml
    - .venv/bin/python docscan/ci_checks.py license-headers
    - .venv/bin/ruff check --line-length 100 docscan/ tests/
    - .venv/bin/ruff format --check docscan/ tests/
    - .venv/bin/mypy docscan/ --ignore-missing-imports --strict-optional --no-error-summary
    - .venv/bin/bandit -r docscan/ -ll -f txt -x docscan/ci_checks.py
    - .venv/bin/pip-audit --skip-editable --progress-spinner off
    - .venv/bin/python docscan/ci_checks.py secrets
    - gitleaks detect --config=.gitleaks.toml --source=. --report-path=gitleaks-report.json --report-format=json --redact || echo "gitleaks skipped"
    - .venv/bin/semgrep --config=.semgrep.yml --error --sarif --output=semgrep-results.sarif docscan/
  artifacts:
    paths:
      - semgrep-results.sarif
      - gitleaks-report.json
    expire_in: 1 week
    when: always

test-job:
  stage: test
  tags: [hackthon_3]
  allow_failure: true
  script:
    - .venv/bin/pytest tests/ -v

coverage-job:
  stage: coverage
  tags: [hackthon_3]
  allow_failure: true
  script:
    - .venv/bin/pytest tests/ -v --tb=short --cov=docscan --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=50
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week
    when: always
