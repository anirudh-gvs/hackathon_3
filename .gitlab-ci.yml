# Trigger pipeline - clean run
---
image: python:3.11-slim

stages:
  - lint
  - type-check
  - security
  - test
  - commit-quality

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip_cache"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_EXTRA_INDEX_URL: "https://abetlen.github.io/llama-cpp-python/whl/cpu"

json-syntax-validation:
  stage: lint
  tags:
    - hackthon_3
  script:
    - python -m pip install -e . --quiet
    - python docscan/ci_checks.py toml

python-format:
  stage: lint
  tags:
    - hackthon_3
  script:
    - python -m pip install black --quiet
    - python -m black --check --line-length 100 docscan/ tests/

python-lint:
  stage: lint
  tags:
    - hackthon_3
  script:
    - python -m pip install ruff --quiet
    - python -m ruff check --line-length 100 docscan/ tests/

yaml-syntax-validation:
  stage: lint
  tags:
    - hackthon_3
  script:
    - python -m pip install yamllint --quiet
    - python -m yamllint -d "{extends: default, rules: {line-length: {max: 200}, truthy: {check-keys: false}}}" .gitlab-ci.yml

python-typecheck:
  stage: type-check
  tags:
    - hackthon_3
  script:
    - python -m pip install mypy pydantic typer rich --quiet
    - python -m pip install -e . --quiet
    - python -m mypy docscan/ --ignore-missing-imports --strict-optional --no-error-summary

python-security:
  stage: security
  tags:
    - hackthon_3
  script:
    - python -m pip install bandit --quiet
    - python -m bandit -r docscan/ -ll -f txt -x docscan/ci_checks.py

dependency-audit:
  stage: security
  tags:
    - hackthon_3
  script:
    - python -m pip install pip-audit --quiet
    - python -m pip_audit --skip-editable --progress-spinner off --ignore-vuln CVE-2025-69872

secret-scanning:
  stage: security
  tags:
    - hackthon_3
  script:
    - python -m pip install -e . --quiet
    - python docscan/ci_checks.py secrets

python-unittest:
  stage: test
  tags:
    - hackthon_3
  before_script:
    - apt-get update && apt-get install -y tesseract-ocr libtesseract-dev poppler-utils --no-install-recommends
  script:
    - python -m pip install pytest pytest-cov pydantic typer rich pdfplumber pytesseract Pillow --quiet
    - python -m pip install -e . --quiet
    - python -m pytest tests/ -v --tb=short --cov=docscan --cov-report=term-missing --cov-fail-under=50

commit-quality:
  stage: commit-quality
  tags:
    - hackthon_3
  script:
    - python -m pip install -e . --quiet
    - python docscan/ci_checks.py commit
