# Gitleaks Configuration for Offline DocScan
# Detects secrets, credentials, and sensitive data in code
# See: https://github.com/gitleaks/gitleaks#configuration

title = "Gitleaks Secret Scan"

# =============================================================================
# Custom Rules for Offline DocScan
# =============================================================================

[[rules]]
id = "python-api-key"
description = "Hardcoded API key in Python code"
severity = "high"
regex = '''(?i)(api[_-]?key|apikey)\s*[:=]\s*['"][a-zA-Z0-9_\-]{20,}['"]'''
path = '''\.py$'''

[[rules]]
id = "python-password"
description = "Hardcoded password in Python code"
severity = "high"
regex = '''(?i)(password|passwd|pwd)\s*[:=]\s*['"][^'"]{8,}['"]'''
path = '''\.py$'''

[[rules]]
id = "python-token"
description = "Hardcoded token in Python code"
severity = "high"
regex = '''(?i)(token|access_token|auth_token)\s*[:=]\s*['"][a-zA-Z0-9_\-\.]{20,}['"]'''
path = '''\.py$'''

[[rules]]
id = "python-secret"
description = "Hardcoded secret in Python code"
severity = "high"
regex = '''(?i)(secret|client_secret)\s*[:=]\s*['"][a-zA-Z0-9_\-]{20,}['"]'''
path = '''\.py$'''

[[rules]]
id = "private-key"
description = "Private key detected"
severity = "critical"
regex = '''-----BEGIN\s+(RSA\s+)?PRIVATE\s+KEY-----'''
path = '''\.py$'''

[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
severity = "high"
regex = '''(AKIA|ASIA)[A-Z0-9]{16}'''
path = '''\.py$'''

[[rules]]
id = "github-token"
description = "GitHub Personal Access Token"
severity = "high"
regex = '''(github_pat_[a-zA-Z0-9_]{22,}|ghp_[a-zA-Z0-9_]{36,}|gho_[a-zA-Z0-9_]{36,})'''
path = '''\.py$'''

[[rules]]
id = "gitlab-token"
description = "GitLab Personal Access Token"
severity = "high"
regex = '''glpat-[a-zA-Z0-9\-]{20,}'''
path = '''\.py$'''

# =============================================================================
# Allowlist (False Positives)
# =============================================================================

[allowlist]
description = "Allowlist for known false positives"
paths = [
  '.*\.md$',
  '.*\.rst$',
  '.*\.txt$',
  'docs/',
  'tests/fixtures/',
  '\.env\.example$',
  '.*\.example$',
  'package-lock\.json$',
  'yarn\.lock$',
  'Pipfile\.lock$',
  'poetry\.lock$',
  '\.venv/',
  'venv/',
  '__pycache__/',
  'node_modules/',
  'build/',
  'dist/',
]
regexes = [
  '''(?i)your_[a-z_]+''',
  '''(?i)example_[a-z_]+''',
  '''(?i)placeholder_[a-z_]+''',
  '''(?i)replace_[a-z_]+''',
  '''(?i)your_secret_key''',
  '''(?i)your_database_url''',
  '''(?i)your_api_key''',
  '''(?i)<your_[a-z_]+>''',
  '''(?i)\{\{[a-z_]+\}\}''',
  '''(?i)env\['[A-Z_]+'\]''',
  '''(?i)os\.getenv\('[A-Z_]+'\)''',
  '''(?i)os\.environ\.get\('[A-Z_]+'\)''',
]
