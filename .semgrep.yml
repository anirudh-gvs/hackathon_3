# Semgrep Configuration for Offline DocScan
# Security-focused rules for Python codebase

# =============================================================================
# Global Configuration
# =============================================================================
language: python
severity: ERROR

# =============================================================================
# Custom Rules for Offline DocScan
# =============================================================================

rules:
  # ===========================================================================
  # Security Rules
  # ===========================================================================
  
  # Detect hardcoded credentials
  - id: hardcoded-credentials
    patterns:
      - pattern-either:
          - pattern: password = "..."
          - pattern: password = '...'
          - pattern: api_key = "..."
          - pattern: api_key = '...'
          - pattern: secret = "..."
          - pattern: secret = '...'
          - pattern: token = "..."
          - pattern: token = '...'
          - pattern: credential = "..."
          - pattern: credential = '...'
    message: Hardcoded credentials detected. Use environment variables instead.
    severity: ERROR
    languages: [python]
    
  # Detect SQL injection vulnerabilities
  - id: sql-injection
    patterns:
      - pattern-either:
          - pattern: cursor.execute("..." + $X)
          - pattern: cursor.execute("...%s..." % $X)
          - pattern: cursor.execute("...{}".format($X))
          - pattern: cursor.execute(f"...{$X}")
    message: Potential SQL injection vulnerability. Use parameterized queries.
    severity: ERROR
    languages: [python]
    
  # Detect command injection via subprocess
  - id: command-injection-subprocess
    patterns:
      - pattern-either:
          - pattern: subprocess.call($CMD, shell=True)
          - pattern: subprocess.run($CMD, shell=True)
          - pattern: subprocess.Popen($CMD, shell=True)
          - pattern: os.system($CMD)
          - pattern: os.popen($CMD)
    message: Command injection risk. Avoid shell=True with user input.
    severity: ERROR
    languages: [python]
    
  # Detect path traversal vulnerabilities
  - id: path-traversal
    patterns:
      - pattern-either:
          - pattern: open($USER_INPUT)
          - pattern: Path($USER_INPUT)
    message: Potential path traversal. Validate and sanitize file paths.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-22"
      
  # Detect unsafe deserialization (pickle)
  - id: unsafe-deserialization
    patterns:
      - pattern: pickle.loads(...)
      - pattern: pickle.load(...)
    message: Unsafe deserialization with pickle. Use JSON or other safe formats.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-502"
      
  # Detect weak cryptography
  - id: weak-cryptography
    patterns:
      - pattern-either:
          - pattern: hashlib.md5(...)
          - pattern: hashlib.sha1(...)
    message: Weak cryptographic hash. Use SHA-256 or stronger.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-328"
      
  # Detect eval() usage
  - id: dangerous-eval
    patterns:
      - pattern: eval(...)
    message: Use of eval() is dangerous. Avoid executing dynamic code.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-95"
      
  # Detect exec() usage
  - id: dangerous-exec
    patterns:
      - pattern: exec(...)
    message: Use of exec() is dangerous. Avoid executing dynamic code.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-95"
      
  # Detect yaml.load (unsafe)
  - id: unsafe-yaml-load
    patterns:
      - pattern: yaml.load(...)
    message: Use yaml.safe_load() instead of yaml.load() to prevent arbitrary code execution.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-502"
      
  # Detect temporary file creation in insecure locations
  - id: insecure-temp-file
    patterns:
      - pattern-either:
          - pattern: tempfile.mktemp(...)
          - pattern: tempfile.NamedTemporaryFile(delete=False)
    message: Insecure temporary file creation. Use secure temp file creation.
    severity: WARNING
    languages: [python]
    
  # Detect debug mode enabled in production
  - id: debug-mode-enabled
    patterns:
      - pattern-either:
          - pattern: app.debug = True
          - pattern: DEBUG = True
    message: Debug mode should not be enabled in production.
    severity: WARNING
    languages: [python]
    
  # Detect hardcoded IP addresses
  - id: hardcoded-ip
    patterns:
      - pattern-regex: \b(?:\d{1,3}\.){3}\d{1,3}\b
    message: Hardcoded IP address detected. Consider using configuration.
    severity: INFO
    languages: [python]
    
  # Detect hardcoded URLs
  - id: hardcoded-url
    patterns:
      - pattern-regex: https?://[^\s"'<>]+
    message: Hardcoded URL detected. Consider using configuration.
    severity: INFO
    languages: [python]

  # ===========================================================================
  # Code Quality Rules
  # ===========================================================================
  
  # Detect bare except clauses
  - id: bare-except
    patterns:
      - pattern: except:
    message: Use 'except Exception:' instead of bare 'except:'.
    severity: WARNING
    languages: [python]
    
  # Detect mutable default arguments
  - id: mutable-default-argument
    patterns:
      - pattern: def $F(..., $X={}, ...):
      - pattern: def $F(..., $X=[], ...):
    message: mutable default argument. Use None and initialize in function body.
    severity: WARNING
    languages: [python]
    
  # Detect print statements (should use logging)
  - id: print-statement
    patterns:
      - pattern: print(...)
    message: Use logging instead of print statements.
    severity: INFO
    languages: [python]
    
  # Detect unused imports
  - id: unused-import
    patterns:
      - pattern: import $X
      - pattern-not: $X(...)
      - pattern-not: $X.
      - pattern-not: $X[
      - pattern-not: $X =
    message: Unused import detected.
    severity: WARNING
    languages: [python]
    
  # Detect assert statements (should not be used for validation)
  - id: assert-used
    patterns:
      - pattern: assert $X
    message: Assert statements should not be used for input validation.
    severity: INFO
    languages: [python]

# =============================================================================
# Include Community Rulesets
# =============================================================================

includes:
  - 'https://semgrep.dev/r/security-audit'
  - 'https://semgrep.dev/r/secrets'
  - 'https://semgrep.dev/r/owasp-top-ten'

# =============================================================================
# Path Configuration
# =============================================================================

paths:
  - docscan/
  - tests/

# =============================================================================
# Exclude Paths
# =============================================================================

exclude:
  - '**/__pycache__/**'
  - '**/*.pyc'
  - '**/build/**'
  - '**/dist/**'
  - '**/.venv/**'
  - '**/venv/**'
  - '**/.eggs/**'
  - '**/*.egg-info/**'
  - '**/.mypy_cache/**'
  - '**/.ruff_cache/**'
  - '**/.pytest_cache/**'
  - '**/htmlcov/**'
  - '**/node_modules/**'
  - '**/models/**'
  - '**/output/**'
  - '**/tmp/**'
  - '**/.cache/**'

# =============================================================================
# Severity Thresholds
# =============================================================================

# Fail on errors, warn on warnings
fail-on: error

# =============================================================================
# Output Configuration
# =============================================================================

output:
  - sarif
  - json
  - text

# =============================================================================
# Optimization
# =============================================================================

# Use caching for faster subsequent runs
cache: true

# Timeout for individual rules (in seconds)
timeout: 30

# Maximum memory usage (in MB)
max-memory: 4096

# Number of parallel jobs
jobs: 1